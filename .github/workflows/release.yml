name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-linux
            ext: ""
          - os: macos-latest
            target: x86_64-macos
            ext: ""
          - os: windows-latest
            target: x86_64-windows
            ext: ".exe"

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - run: cargo build --release

      - run: |
          mkdir -p dist
          cp target/release/regcmp${{ matrix.ext }} dist/regcmp-${{ matrix.target }}${{ matrix.ext }}

      - uses: actions/upload-artifact@v4
        with:
          name: regcmp-${{ matrix.target }}
          path: dist/regcmp-${{ matrix.target }}${{ matrix.ext }}

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/regcmp-x86_64-linux
            dist/regcmp-x86_64-macos
            dist/regcmp-x86_64-windows.exe
          generate_release_notes: true
