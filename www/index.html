<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>regcmp — 正则表达式等价性判定</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="container">
  <h1>
    regcmp
    <a class="git-icon" href="https://github.com/Alkaid114/regcmp" target="_blank" title="在 GitHub 上查看源码">
      <svg viewBox="0 0 78 78" width="22" height="22">
        <path fill="#f03c2e" transform="translate(10 10) rotate(-45 29 29)" d="M5,58c-2.76142,0 -5,-2.23858 -5,-5v-48c0,-2.76142 2.23858,-5 5,-5h33v12.54404c-2.06553,0.94801 -3.5,3.03446 -3.5,5.45596c0,0.73514 0.13221,1.43941 0.37415,2.09031l-15.28384,15.28384c-0.6509,-0.24194 -1.35517,-0.37415 -2.09031,-0.37415c-3.31371,0 -6,2.68629 -6,6c0,3.31371 2.68629,6 6,6c3.31371,0 6,-2.68629 6,-6c0,-0.73514 -0.13221,-1.43941 -0.37415,-2.09031l14.87415,-14.87415l0,11.50851c-2.06553,0.94801 -3.5,3.03446 -3.5,5.45596c0,3.31371 2.68629,6 6,6c3.31371,0 6,-2.68629 6,-6c0,-2.42149 -1.43447,-4.50795 -3.5,-5.45596l0,-12.08808c2.06553,-0.94801 3.5,-3.03446 3.5,-5.45596c0,-2.42149 -1.43447,-4.50795 -3.5,-5.45596l0,-12.54404h10c2.76142,0 5,2.23858 5,5v48c0,2.76142 -2.23858,5 -5,5z"/>
      </svg>
    </a>
  </h1>
  <p class="subtitle">形式正则表达式等价性判定工具</p>

  <div class="inputs">
    <label>正则表达式 1
      <input id="re1" value="(a|b)*" spellcheck="false">
    </label>
    <label>正则表达式 2
      <input id="re2" value="(a*b*)*" spellcheck="false">
    </label>
  </div>

  <label class="vlabel">
    <input id="verbose" type="checkbox" onchange="toggleVerbose()">
    <span>详细输出</span>
  </label>

  <button id="btn" onclick="run()">比较</button>
  <p id="result"></p>
  <pre id="detail" style="display:none"></pre>
</div>

<script type="module">
import init, { compare, compare_verbose } from './pkg/regcmp_wasm.js';

function toggleVerbose() {
  const v = document.getElementById('verbose').checked;
  document.getElementById('detail').style.display = v ? '' : 'none';
  if (!v) document.getElementById('detail').textContent = '';
}

async function run() {
  const btn = document.getElementById('btn');
  const out = document.getElementById('result');
  const detail = document.getElementById('detail');
  const re1 = document.getElementById('re1').value;
  const re2 = document.getElementById('re2').value;
  const verbose = document.getElementById('verbose').checked;

  btn.disabled = true;
  out.className = '';
  out.textContent = '计算中...';
  detail.textContent = '';

  try {
    await init();
    if (verbose) {
      const result = compare_verbose(re1, re2);
      const lines = result.split('\n');
      out.textContent = lines[lines.length - 1];
      out.className = out.textContent === '等价' ? 'eq' : 'neq';
      detail.textContent = result.slice(0, result.lastIndexOf('\n'));
      detail.style.display = '';
    } else {
      const result = compare(re1, re2);
      out.textContent = result;
      out.className = result === '等价' ? 'eq' : 'neq';
    }
  } catch (e) {
    out.textContent = '运行时错误: ' + e;
    out.className = 'neq';
  } finally {
    btn.disabled = false;
  }
}

window.run = run;
window.toggleVerbose = toggleVerbose;
</script>
</body>
</html>
