<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>regcmp — 正则表达式等价性判定</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="container">
  <h1>
    regcmp
    <a class="git-icon" href="https://github.com/Alkaid114/regcmp" target="_blank" title="在 GitHub 上查看源码">
      <svg viewBox="0 0 78 78" width="22" height="22">
        <path fill="#f03c2e" transform="translate(10 10) rotate(-45 29 29)" d="M5,58c-2.76142,0 -5,-2.23858 -5,-5v-48c0,-2.76142 2.23858,-5 5,-5h33v12.54404c-2.06553,0.94801 -3.5,3.03446 -3.5,5.45596c0,0.73514 0.13221,1.43941 0.37415,2.09031l-15.28384,15.28384c-0.6509,-0.24194 -1.35517,-0.37415 -2.09031,-0.37415c-3.31371,0 -6,2.68629 -6,6c0,3.31371 2.68629,6 6,6c3.31371,0 6,-2.68629 6,-6c0,-0.73514 -0.13221,-1.43941 -0.37415,-2.09031l14.87415,-14.87415l0,11.50851c-2.06553,0.94801 -3.5,3.03446 -3.5,5.45596c0,3.31371 2.68629,6 6,6c3.31371,0 6,-2.68629 6,-6c0,-2.42149 -1.43447,-4.50795 -3.5,-5.45596l0,-12.08808c2.06553,-0.94801 3.5,-3.03446 3.5,-5.45596c0,-2.42149 -1.43447,-4.50795 -3.5,-5.45596l0,-12.54404h10c2.76142,0 5,2.23858 5,5v48c0,2.76142 -2.23858,5 -5,5z"/>
      </svg>
    </a>
  </h1>
  <p class="subtitle">形式正则表达式等价性判定工具</p>

  <div class="inputs">
    <div class="input-row">
      <div class="input-head">
        <span class="input-label">输入 1</span>
        <select class="mode-select" data-idx="1">
          <option value="re">正则表达式</option>
          <option value="fsm">自动机</option>
        </select>
        <button class="file-btn" data-idx="1" style="display:none">选择文件</button>
        <input type="file" class="file-input" data-idx="1" accept=".txt,.fsm">
      </div>
      <input id="input1-re" class="input-box" value="(a|b)*" spellcheck="false">
      <textarea id="input1-fsm" class="input-box input-fsm" spellcheck="false" style="display:none" rows="6"># 接受全体字符串的 DFA
start: q0
accept: q0
q0 a q0
q0 b q0</textarea>
    </div>
    <div class="input-row">
      <div class="input-head">
        <span class="input-label">输入 2</span>
        <select class="mode-select" data-idx="2">
          <option value="re">正则表达式</option>
          <option value="fsm">自动机</option>
        </select>
        <button class="file-btn" data-idx="2" style="display:none">选择文件</button>
        <input type="file" class="file-input" data-idx="2" accept=".txt,.fsm">
      </div>
      <input id="input2-re" class="input-box" value="(a*b*)*" spellcheck="false">
      <textarea id="input2-fsm" class="input-box input-fsm" spellcheck="false" style="display:none" rows="6"># 也接受全体字符串的 DFA
start: q0
accept: q0 q1
q0 a q1
q0 b q1
q1 a q0
q1 b q0</textarea>
    </div>
  </div>

  <label class="vlabel">
    <input id="verbose" type="checkbox">
    <span>详细输出</span>
  </label>

  <button id="btn" onclick="run()">比较</button>
  <p id="result"></p>
  <pre id="detail" style="display:none"></pre>
</div>

<script type="module">
import init, { compare_typed, compare_typed_verbose } from './pkg/regcmp_wasm.js';

document.querySelectorAll('.mode-select').forEach(sel => {
  sel.addEventListener('change', () => {
    const idx = sel.dataset.idx;
    const isFsm = sel.value === 'fsm';
    document.getElementById(`input${idx}-re`).style.display = isFsm ? 'none' : '';
    document.getElementById(`input${idx}-fsm`).style.display = isFsm ? '' : 'none';
    document.querySelector(`.file-btn[data-idx="${idx}"]`).style.display = isFsm ? '' : 'none';
  });
});

document.querySelectorAll('.file-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    const idx = btn.dataset.idx;
    document.querySelector(`.file-input[data-idx="${idx}"]`).click();
  });
});

document.querySelectorAll('.file-input').forEach(input => {
  input.addEventListener('change', async () => {
    const file = input.files[0];
    if (!file) return;
    const idx = input.dataset.idx;
    try {
      const text = await file.text();
      document.getElementById(`input${idx}-fsm`).value = text;
    } catch (e) {
      alert('读取文件失败: ' + e);
    }
  });
});

async function run() {
  const btn = document.getElementById('btn');
  const out = document.getElementById('result');
  const detail = document.getElementById('detail');
  const verbose = document.getElementById('verbose').checked;

  const mode1 = document.querySelector('.mode-select[data-idx="1"]').value;
  const mode2 = document.querySelector('.mode-select[data-idx="2"]').value;
  const val1 = mode1 === 're'
    ? document.getElementById('input1-re').value
    : document.getElementById('input1-fsm').value;
  const val2 = mode2 === 're'
    ? document.getElementById('input2-re').value
    : document.getElementById('input2-fsm').value;

  btn.disabled = true;
  out.className = '';
  out.textContent = '计算中...';
  detail.textContent = '';
  detail.style.display = 'none';

  try {
    await init();
    if (verbose) {
      const result = compare_typed_verbose(val1, mode1, val2, mode2);
      const trimmed = result.trimEnd();
      const lines = trimmed.split('\n');
      out.textContent = lines[lines.length - 1];
      out.className = out.textContent === '等价' ? 'eq' : 'neq';
      const lastNl = trimmed.lastIndexOf('\n');
      detail.textContent = lastNl >= 0 ? trimmed.slice(0, lastNl) : '';
      detail.style.display = '';
    } else {
      const result = compare_typed(val1, mode1, val2, mode2);
      out.textContent = result;
      out.className = result === '等价' ? 'eq' : 'neq';
    }
  } catch (e) {
    out.textContent = '运行时错误: ' + e;
    out.className = 'neq';
  } finally {
    btn.disabled = false;
  }
}

window.run = run;
</script>
</body>
</html>
